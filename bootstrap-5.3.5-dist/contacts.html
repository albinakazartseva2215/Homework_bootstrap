<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Контакты</title>
    <!-- Подключение локальных файлов стилей Bootstrap -->
    <link href="/bootstrap-5.3.5-dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/bootstrap-5.3.5-dist/styles.css" rel="stylesheet">
</head>
<body>
        <!-- Верхняя панель -->
    <div class="top-navbar">
        <img src="https://getbootstrap.com/docs/5.1/assets/brand/bootstrap-logo.svg" width="30" height="24">
        <h5 class="text-white mb-0">Меню</h5>
    </div>

    <!-- Темная боковая панель -->
    <div class="sidebar">
        <!-- Меню -->
        <div class="menu-title"></div>
        <nav class="nav flex-column">
            <a class="nav-link active" href="#">
                <i class="fas fa-home me-2"></i>
                Главная
            </a>
            <a class="nav-link" href="#">
                <i class="fas fa-list-alt me-2"></i>
                Категории
            </a>
            <a class="nav-link" href="#">
                <i class="fas fa-shopping-cart me-2"></i>
                Заказы
            </a>
            <a class="nav-link" href="#">
                <i class="fas fa-envelope me-2"></i>
                Контакты
            </a>
        </nav>
        <!-- Блок пользователя -->
        <div class="user-menu fixed-bottom">
            <div class="nav-item dropdown">
                <a class="nav-link dropdown-toggle d-flex align-items-center"
                   href="#"
                   data-bs-toggle="dropdown">
                    <i class="fas fa-user-circle me-2"></i>
                    Пользователь
                </a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">
                        <i class="fas fa-user me-2"></i>Профиль
                    </a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" href="#">
                        <i class="fas fa-sign-out-alt me-2"></i>Выйти
                    </a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="main-content">
        <!-- Заголовок -->
        <h1 class="text-center mb-5">Контакты</h1>
        <div class="row"> <!-- Основной блок для работы с колонками -->
            <div class="col-2"></div>
            <div class="col-8"> <!-- Колонка шириной 8/12 для размещения основного контента -->
                <div class="row g-3"> <!-- Дополнительный вложенный блок для работы с колонками -->
                    <div class="col-5"> <!-- -->
                        <div class="card h-100">
                            <div class="card-body">
                                <form>
                                    <div class="mb-3">
                                        <label for="exampleInputName" class="form-label">Имя</label>
                                        <input type=text" class="form-control" id="exampleInputName" aria-describedby="emailHelp">
                                    </div>
                                    <div class="mb-3">
                                        <label for="exampleInputEmail1" class="form-label">Почта</label>
                                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                                    </div>
                                    <div class="mb-3">
                                        <label for="textInputExample" class="form-label">Сообщение</label>
                                        <textarea class="form-control" id="textInputExample" placeholder="" rows="3"></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-primary">Отправить</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-5" style="margin-left: 100px;"> <!-- Колонка для текста -->
                        <div class="card border-light mb-3 h-100">
                          <div class="card-body">
                            <h5 class="card-title">Наши контакты</h5>
                            <p class="card-text">Some contacts.</p>
                          </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-2"></div>
        </div>
    </div>
</body>
</html>
