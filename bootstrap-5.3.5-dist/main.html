<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Главная</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .top-navbar {
            background-color: #000;
            height: 60px;
            padding: 10px 20px;
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        body {
            background-color: #f8f9fa;
        }

        .sidebar {
            background-color: #212529;
            min-height: 100vh;
            width: 250px;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px 0;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .menu {
            flex: 1;
            background-color: #212529;
            padding: 20px;
            max-width: 250px; /* Фиксированная ширина меню */
        }
        .menu-title {
            color: #adb5bd;
            padding: 15px 25px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-link {
            color: #dee2e6 !important;
            padding: 12px 25px;
            margin: 2px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background-color: #343a40;
            color: #fff !important;
        }

        .nav-link.active {
            background-color: #0d6efd;
            color: #fff !important;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .logo {
            padding: 20px 25px;
            margin-bottom: 15px;
        }

        .logo-text {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .user-menu {
            margin-top: auto; /* Прижимаем к низу */
            border-top: 1px solid #34495e;
            padding: 15px;
        }
    </style>
</head>
<body>
        <!-- Верхняя панель -->
    <div class="top-navbar">
        <img src="/docs/5.3/assets/brand/bootstrap-logo.svg" alt="" width="30" height="24">
        <h5 class="text-white mb-0">Меню</h5>
    </div>

    <!-- Темная боковая панель -->
    <div class="sidebar">
        <!-- Меню -->
        <div class="menu-title"></div>
        <nav class="nav flex-column">
            <a class="nav-link active" href="#">
                <i class="fas fa-home me-2"></i>
                Главная
            </a>
            <a class="nav-link" href="#">
                <i class="fas fa-list-alt me-2"></i>
                Категории
            </a>
            <a class="nav-link" href="#">
                <i class="fas fa-shopping-cart me-2"></i>
                Заказы
            </a>
            <a class="nav-link" href="#">
                <i class="fas fa-envelope me-2"></i>
                Контакты
            </a>
        </nav>
        <!-- Блок пользователя -->
        <div class="user-menu fixed-bottom">
            <div class="nav-item dropdown">
                <a class="nav-link dropdown-toggle d-flex align-items-center"
                   href="#"
                   data-bs-toggle="dropdown">
                    <i class="fas fa-user-circle me-2"></i>
                    Пользователь
                </a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">
                        <i class="fas fa-user me-2"></i>Профиль
                    </a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" href="#">
                        <i class="fas fa-sign-out-alt me-2"></i>Выйти
                    </a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="main-content">
        <!-- Заголовок -->
        <h1 class="text-center mb-5">Главная</h1>

        <!-- Карточки товаров -->
        <div class="row g-3">
            <!-- Карточка 1 -->
            <div class="col-md-4">
                <div class="card">
                      <div class="card-header text-center">
                        Товар 1
                      </div>
                      <div class="card-body text-center">
                        <h3 class="card-title">$ 100</h3>
                        <p class="card-text">The product is excellent.</p>
                        <div class="d-flex flex-column align-items-center">
                          <button type="button" class="btn btn-light">Купить</button>
                        </div>
                      </div>
                </div>
            </div>

            <!-- Карточка 2 -->
            <div class="col-md-4">
                <div class="card">
                      <div class="card-header text-center">
                        Товар 1
                      </div>
                      <div class="card-body text-center">
                        <h3 class="card-title">$ 100</h3>
                        <p class="card-text">The product is excellent.</p>
                        <div class="d-flex flex-column align-items-center">
                          <button type="button" class="btn btn-light">Купить</button>
                        </div>
                      </div>
                </div>
            </div>

            <!-- Карточка 3 -->
            <div class="col-md-4">
                <div class="card">
                      <div class="card-header text-center">
                        Товар 1
                      </div>
                      <div class="card-body text-center">
                        <h3 class="card-title">$ 100</h3>
                        <p class="card-text">The product is excellent.</p>
                        <div class="d-flex flex-column align-items-center">
                          <button type="button" class="btn btn-light">Купить</button>
                        </div>
                      </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
